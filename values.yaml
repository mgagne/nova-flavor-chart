---

novaFlavors:
  cloudCredentials:
    cloudName: openstack
    secretName: nova-flavor-clouds
  # -- Job nodeSelector
  nodeSelector: {}
  # -- Job resources
  resources:
    limits:
      cpu: '2'
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 128Mi
  securityContext:
    allowPrivilegeEscalation: false
  specs:
    m1_tiny:
      name: "m1.tiny"
      ram: 512
      disk: 1
      vcpus: 1
    m1_small:
      name: "m1.small"
      ram: 2048
      disk: 20
      vcpus: 1
    m1_medium:
      name: "m1.medium"
      ram: 4096
      disk: 40
      vcpus: 2
    m1_large:
      name: "m1.large"
      ram: 8192
      disk: 80
      vcpus: 4
    m1_xlarge:
      name: "m1.xlarge"
      ram: 16384
      disk: 160
      vcpus: 8

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nova-flavor
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: nova-flavor
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["osh.openstack.org"]
    resources: ["flavors"]
    verbs: ["list"]
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: nova-flavor
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: nova-flavor
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  kind: Role
  name: nova-flavor
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: nova-flavor
